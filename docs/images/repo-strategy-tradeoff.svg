<svg viewBox="0 0 680 660" width="680" height="660" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<style>
.th{font-family:monospace;font-size:14px;font-weight:600;fill:#1a1a1a}
.ts{font-family:monospace;font-size:11px;fill:#444}
.teal-bg{fill:#d1fae5;stroke:#0f6e56}
.coral-bg{fill:#fee2e2;stroke:#993c1d}
.gray-bg{fill:#f3f4f6;stroke:#9ca3af}
.purple-bg{fill:#ede9fe;stroke:#534ab7}
</style>

<text class="th" x="340" y="28" text-anchor="middle">Repository strategy — FlowPilot tradeoff analysis</text>

<rect x="20" y="44" width="196" height="40" rx="8" class="teal-bg" stroke-width="0.8"/>
<text class="th" x="118" y="64" text-anchor="middle" dominant-baseline="central" fill="#065f46">Monorepo</text>
<rect x="228" y="44" width="196" height="40" rx="8" class="coral-bg" stroke-width="0.8"/>
<text class="th" x="326" y="64" text-anchor="middle" dominant-baseline="central" fill="#7f1d1d">Polyrepo (current)</text>
<rect x="436" y="44" width="224" height="40" rx="8" class="purple-bg" stroke-width="0.8"/>
<text class="th" x="548" y="64" text-anchor="middle" dominant-baseline="central" fill="#3c3489">Hybrid (Nx/Turborepo)</text>

<text class="ts" x="340" y="107" text-anchor="middle" fill="#6b7280">Skills &amp; config</text>
<rect x="20" y="92" width="196" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="118" y="111" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ One central location</text>
<rect x="228" y="92" width="196" height="38" rx="5" class="gray-bg" stroke-width="0.5"/>
<text class="ts" x="326" y="111" text-anchor="middle" dominant-baseline="central" fill="#374151">❌ Duplicated — drift risk</text>
<rect x="436" y="92" width="224" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="548" y="111" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Central + per-package</text>

<text class="ts" x="340" y="155" text-anchor="middle" fill="#6b7280">Multi-cloud / multi-infra</text>
<rect x="20" y="140" width="196" height="38" rx="5" class="coral-bg" stroke-width="0.5"/>
<text class="ts" x="118" y="159" text-anchor="middle" dominant-baseline="central" fill="#7f1d1d">❌ Needs discipline</text>
<rect x="228" y="140" width="196" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="326" y="159" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Natural per-repo targets</text>
<rect x="436" y="140" width="224" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="548" y="159" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Per-package targets</text>

<text class="ts" x="340" y="203" text-anchor="middle" fill="#6b7280">Multi-container</text>
<rect x="20" y="188" width="196" height="38" rx="5" class="gray-bg" stroke-width="0.5"/>
<text class="ts" x="118" y="207" text-anchor="middle" dominant-baseline="central" fill="#374151">⚠️ Less isolated</text>
<rect x="228" y="188" width="196" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="326" y="207" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Per-repo Dockerfile</text>
<rect x="436" y="188" width="224" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="548" y="207" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Per-package Dockerfile</text>

<text class="ts" x="340" y="251" text-anchor="middle" fill="#6b7280">Security boundaries</text>
<rect x="20" y="236" width="196" height="38" rx="5" class="coral-bg" stroke-width="0.5"/>
<text class="ts" x="118" y="255" text-anchor="middle" dominant-baseline="central" fill="#7f1d1d">❌ Wider blast radius</text>
<rect x="228" y="236" width="196" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="326" y="255" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Repo = boundary</text>
<rect x="436" y="236" width="224" height="38" rx="5" class="gray-bg" stroke-width="0.5"/>
<text class="ts" x="548" y="255" text-anchor="middle" dominant-baseline="central" fill="#374151">⚠️ CODEOWNERS needed</text>

<text class="ts" x="340" y="299" text-anchor="middle" fill="#6b7280">Agent boundaries</text>
<rect x="20" y="284" width="196" height="38" rx="5" class="gray-bg" stroke-width="0.5"/>
<text class="ts" x="118" y="303" text-anchor="middle" dominant-baseline="central" fill="#374151">⚠️ Needs discipline</text>
<rect x="228" y="284" width="196" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="326" y="303" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Repo = boundary</text>
<rect x="436" y="284" width="224" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="548" y="303" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Package = boundary</text>

<text class="ts" x="340" y="347" text-anchor="middle" fill="#6b7280">Migration cost</text>
<rect x="20" y="332" width="196" height="38" rx="5" class="coral-bg" stroke-width="0.5"/>
<text class="ts" x="118" y="351" text-anchor="middle" dominant-baseline="central" fill="#7f1d1d">❌ High — full restructure</text>
<rect x="228" y="332" width="196" height="38" rx="5" class="teal-bg" stroke-width="0.5"/>
<text class="ts" x="326" y="351" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Zero — already here</text>
<rect x="436" y="332" width="224" height="38" rx="5" class="coral-bg" stroke-width="0.5"/>
<text class="ts" x="548" y="351" text-anchor="middle" dominant-baseline="central" fill="#7f1d1d">❌ High — tooling setup</text>

<!-- Score row -->
<rect x="20" y="390" width="196" height="38" rx="5" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
<text class="th" x="118" y="409" text-anchor="middle" dominant-baseline="central" fill="#92400e">Score: 1 ✅  3 ❌  2 ⚠️</text>
<rect x="228" y="390" width="196" height="38" rx="5" fill="#d1fae5" stroke="#065f46" stroke-width="1.5"/>
<text class="th" x="326" y="409" text-anchor="middle" dominant-baseline="central" fill="#065f46">Score: 5 ✅  0 ❌  1 ⚠️</text>
<rect x="436" y="390" width="224" height="38" rx="5" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
<text class="th" x="548" y="409" text-anchor="middle" dominant-baseline="central" fill="#92400e">Score: 4 ✅  2 ❌  1 ⚠️</text>

<!-- Winner banner -->
<rect x="20" y="448" width="640" height="52" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="1.5"/>
<text class="th" x="340" y="466" text-anchor="middle" dominant-baseline="central" fill="#065f46">✅ Decision: Polyrepo retained — 5 advantages, 1 weakness (skills sync)</text>
<text class="ts" x="340" y="488" text-anchor="middle" dominant-baseline="central" fill="#065f46">Weakness mitigated: flowpilot-docs as central skills source of truth + sync on every update</text>

<!-- Footer -->
<text class="ts" x="340" y="530" text-anchor="middle" fill="#9ca3af">FlowPilot · NSCS B.V. · ADR-017 · May 2026</text>
</svg>
